<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy Logan</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px 20px;
        background: #0d1117;
        color: #c9d1d9;
        margin: 0;
    }
    .container {
        max-width: 1200px;
        margin: 0 auto;
    }
    img {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #58a6ff;
        box-shadow: 0 0 30px rgba(88, 166, 255, 0.2);
    }
    h1 {
        font-size: 2.8em;
        color: #f0f6fc;
        margin: 20px 0 5px;
    }
    .subtitle {
        color: #8b949e;
        font-size: 1.2em;
        margin-bottom: 40px;
    }
    h2 {
        color: #f0f6fc;
        font-size: 2em;
        border-bottom: 2px solid #30363d;
        padding-bottom: 10px;
        display: inline-block;
    }
    .projects {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        margin-top: 30px;
    }
    .project-card {
        background: #161b22;
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #30363d;
        width: 320px;
        text-align: left;
        transition: transform 0.2s, border-color 0.2s;
    }
    .project-card:hover {
        transform: translateY(-5px);
        border-color: #58a6ff;
    }
    .project-card h3 {
        margin: 0 0 10px;
        font-size: 1.3em;
    }
    .project-card h3 a {
        color: #58a6ff;
        text-decoration: none;
    }
    .project-card h3 a:hover {
        text-decoration: underline;
    }
    .project-card p {
        color: #8b949e;
        margin: 8px 0;
        font-size: 0.95em;
        line-height: 1.5;
    }
    .project-card .stats {
        color: #8b949e;
        font-size: 0.85em;
        margin-top: 12px;
    }
    .project-card .stats span {
        margin-right: 15px;
    }
</style>
</head>
<body>
    <div class="container">
    <!-- Profile Image -->
    <img src="photos/profile-photo.jpg" alt="Wendy Logan">

    <!-- Name -->
    <h1>Wendy Logan</h1>

    <!-- Projects Loaded from GitHub -->
    <h2>My Projects</h2>
    <div class="projects" id="projects"></div>

    <script>
        // Fetch your public GitHub repos
        fetch('https://api.github.com/users/wendylogan/repos')
            .then(response => response.json())
            .then(repos => {
                const container = document.getElementById('projects');
                repos.forEach(repo => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.innerHTML = `
                        <h3><a href="${repo.html_url}" target="_blank">${repo.name}</a></h3>
                        <p>${repo.description || 'No description'}</p>
                        <p>⭐ ${repo.stargazers_count} | 🍴 ${repo.forks_count}</p>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('projects').innerHTML = '<p>Could not load projects.</p>';
            });
    </script>
</div>
</body>
</html>
